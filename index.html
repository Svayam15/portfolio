<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Svayam Shanishwara</title>
<!-- Prevent flash: apply saved theme before CSS renders -->
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#050505;
  --surface:#0c0c0c;
  --ink:#e8e4dc;
  --muted:#444;
  --accent:#ff4d1c;
  --border:rgba(255,255,255,0.06);
  --display:'Bebas Neue',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}

[data-theme="light"]{
  --bg:#f5f2ee;
  --surface:#eeebe6;
  --ink:#111;
  --muted:#999;
  --accent:#ff4d1c;
  --border:rgba(0,0,0,0.08);
}

[data-theme="light"] nav{background:rgba(245,242,238,0.88);}
[data-theme="light"] .hero-bg-text{-webkit-text-stroke:1px rgba(0,0,0,0.04);}
[data-theme="light"] .contact-big span{-webkit-text-stroke:1px rgba(0,0,0,0.2);}
[data-theme="light"] .hero h1 .outline{-webkit-text-stroke:1px var(--ink);}
[data-theme="light"] body::before{opacity:0.15;}
[data-theme="light"] .cursor-ring{border-color:rgba(255,77,28,0.35);}

html{scroll-behavior:smooth;}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.7;
  cursor:none;
  overflow-x:hidden;
}

/* Custom cursor */
.cursor{
  position:fixed;width:8px;height:8px;
  background:var(--accent);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.1s,width 0.2s,height 0.2s;
}
.cursor-ring{
  position:fixed;width:32px;height:32px;
  border:1px solid rgba(255,77,28,0.4);
  border-radius:50%;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform 0.12s ease,width 0.2s,height 0.2s,border-color 0.2s;
}
body:has(a:hover) .cursor{width:12px;height:12px;}
body:has(a:hover) .cursor-ring{width:48px;height:48px;border-color:rgba(255,77,28,0.7);}

/* Noise overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1000;opacity:0.4;
}

/* Nav */
nav{
  position:fixed;top:0;left:0;right:0;
  padding:1.5rem 3rem;
  display:flex;align-items:center;justify-content:space-between;
  z-index:100;
  border-bottom:1px solid var(--border);
  background:rgba(5,5,5,0.85);
  backdrop-filter:blur(12px);
}
.nav-logo{
  font-family:var(--mono);font-size:12px;
  color:var(--muted);letter-spacing:0.1em;
  text-decoration:none;text-transform:uppercase;
}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{
  font-family:var(--mono);font-size:11px;
  color:var(--muted);text-decoration:none;
  letter-spacing:0.08em;text-transform:uppercase;
  transition:color 0.2s;position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-2px;left:0;
  width:0;height:1px;background:var(--accent);
  transition:width 0.3s;
}
.nav-links a:hover{color:var(--ink);}
.nav-links a:hover::after{width:100%;}

/* Hero */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:5rem 3rem 4rem;
  position:relative;overflow:hidden;
}

.hero-bg-text{
  position:absolute;top:50%;left:-0.02em;
  transform:translateY(-50%);
  font-family:var(--display);
  font-size:clamp(18rem, 28vw, 36rem);
  color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,0.03);
  line-height:1;white-space:nowrap;
  pointer-events:none;user-select:none;
  letter-spacing:-0.02em;
}

.hero-line{
  font-family:var(--mono);font-size:11px;
  color:var(--accent);letter-spacing:0.15em;
  text-transform:uppercase;margin-bottom:1.5rem;
  opacity:0;animation:slideIn 0.8s ease 0.2s forwards;
}

.hero h1{
  font-family:var(--display);
  font-size:clamp(5rem,12vw,14rem);
  line-height:0.9;letter-spacing:-0.01em;
  color:var(--ink);
  opacity:0;animation:slideIn 0.8s ease 0.4s forwards;
}

.hero h1 .outline{
  color:transparent;
  -webkit-text-stroke:1px var(--ink);
}

.hero-sub{
  max-width:480px;color:var(--muted);
  font-size:14px;line-height:1.8;
  margin-top:2rem;
  opacity:0;animation:slideIn 0.8s ease 0.6s forwards;
}

.hero-bottom{
  display:flex;align-items:flex-end;
  justify-content:space-between;margin-top:3rem;
  opacity:0;animation:slideIn 0.8s ease 0.8s forwards;
}

.hero-cta{
  display:inline-flex;align-items:center;gap:12px;
  font-family:var(--mono);font-size:11px;
  color:var(--ink);text-decoration:none;
  letter-spacing:0.1em;text-transform:uppercase;
  border:1px solid var(--border);
  padding:0.9rem 1.8rem;
  transition:all 0.3s;position:relative;overflow:hidden;
}
.hero-cta::before{
  content:'';position:absolute;inset:0;
  background:var(--accent);transform:translateX(-101%);
  transition:transform 0.3s ease;z-index:-1;
}
.hero-cta:hover{border-color:var(--accent);color:#000;}
.hero-cta:hover::before{transform:translateX(0);}

.hero-scroll{
  font-family:var(--mono);font-size:10px;
  color:var(--muted);letter-spacing:0.1em;
  text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.scroll-line{
  width:1px;height:48px;background:linear-gradient(to bottom,var(--muted),transparent);
  animation:scrollPulse 2s ease infinite;
}

/* Photo in hero */
.hero-photo-wrap{
  position:absolute;right:3rem;top:50%;
  transform:translateY(-50%);
  opacity:0;animation:slideIn 0.8s ease 0.5s forwards;
}
.hero-photo-wrap img{
  width:280px;height:380px;
  object-fit:cover;object-position:center top;
  filter:grayscale(30%) contrast(1.1);
  display:block;
}
.hero-photo-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right, var(--bg) 0%, transparent 30%, transparent 70%, var(--bg) 100%),
             linear-gradient(to bottom, transparent 60%, var(--bg) 100%);
  pointer-events:none;
}

/* Sections */
.section{
  padding:6rem 3rem;
  border-top:1px solid var(--border);
  max-width:1100px;margin:0 auto;
}

.section-header{
  display:flex;align-items:baseline;gap:1.5rem;
  margin-bottom:4rem;
}
.section-num{
  font-family:var(--mono);font-size:11px;
  color:var(--accent);letter-spacing:0.1em;
}
.section-title{
  font-family:var(--display);
  font-size:clamp(3rem,6vw,6rem);
  color:var(--ink);line-height:1;
  letter-spacing:0.02em;
}

/* About */
.about-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:4rem;align-items:start;
}
.about-text p{
  color:var(--muted);font-size:15px;
  line-height:1.9;margin-bottom:1.2rem;
}
.about-text p:last-child{margin-bottom:0;}

.skills-grid{display:flex;flex-direction:column;gap:1.5rem;}
.skill-row{border-top:1px solid var(--border);padding-top:1rem;}
.skill-label{
  font-family:var(--mono);font-size:10px;
  color:var(--accent);letter-spacing:0.12em;
  text-transform:uppercase;margin-bottom:0.6rem;
}
.skill-tags{display:flex;flex-wrap:wrap;gap:6px;}
.skill-tag{
  font-family:var(--mono);font-size:11px;
  color:var(--muted);padding:4px 12px;
  border:1px solid var(--border);
  transition:all 0.2s;
}
.skill-tag:hover{border-color:var(--accent);color:var(--ink);}

/* Projects */
.projects-list{display:flex;flex-direction:column;}
.project-item{
  display:grid;grid-template-columns:80px 1fr auto;
  gap:2rem;align-items:start;
  padding:2rem 0;border-top:1px solid var(--border);
  text-decoration:none;color:inherit;
  transition:all 0.3s;position:relative;
}
.project-item:last-child{border-bottom:1px solid var(--border);}
.project-item::before{
  content:'';position:absolute;left:-3rem;top:0;bottom:0;
  width:0;background:rgba(255,77,28,0.04);
  transition:width 0.4s;
}
.project-item:hover::before{width:calc(100% + 6rem);}
.project-num{
  font-family:var(--display);font-size:3rem;
  color:rgba(255,255,255,0.05);line-height:1;
  transition:color 0.3s;
}
.project-item:hover .project-num{color:rgba(255,77,28,0.2);}
.project-name{
  font-family:var(--display);font-size:2.5rem;
  color:var(--ink);line-height:1;
  margin-bottom:0.5rem;letter-spacing:0.02em;
  transition:color 0.3s;
}
.project-item:hover .project-name{color:var(--accent);}
.project-desc{font-size:13px;color:var(--muted);line-height:1.7;}
.project-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:0.75rem;}
.project-tag{
  font-family:var(--mono);font-size:10px;
  color:var(--muted);letter-spacing:0.06em;
}
.project-arrow{
  font-size:1.5rem;color:var(--muted);
  transition:transform 0.3s,color 0.3s;
  align-self:center;
}
.project-item:hover .project-arrow{
  transform:translate(4px,-4px);
  color:var(--accent);
}

/* Contact */
.contact-big{
  font-family:var(--display);
  font-size:clamp(4rem,9vw,10rem);
  color:var(--ink);line-height:0.9;
  margin-bottom:3rem;letter-spacing:0.02em;
}
.contact-big span{
  color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,0.2);
}
.contact-links{display:flex;flex-direction:column;gap:0;max-width:500px;}
.contact-link{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 0;border-bottom:1px solid var(--border);
  text-decoration:none;color:var(--ink);
  font-family:var(--mono);font-size:12px;
  letter-spacing:0.06em;transition:all 0.2s;
}
.contact-link:first-child{border-top:1px solid var(--border);}
.contact-link:hover{color:var(--accent);padding-left:8px;}
.contact-link-arrow{transition:transform 0.2s;}
.contact-link:hover .contact-link-arrow{transform:translate(4px,-4px);}

.resume-row{
  margin-top:3rem;display:flex;align-items:center;
  gap:2rem;padding:2rem;
  border:1px solid var(--border);
  justify-content:space-between;flex-wrap:wrap;
}
.resume-label p:first-child{font-size:14px;font-weight:400;margin-bottom:4px;}
.resume-label p:last-child{font-family:var(--mono);font-size:11px;color:var(--muted);}
.btn-resume{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:11px;
  color:#000;background:var(--accent);
  padding:0.8rem 1.6rem;text-decoration:none;
  letter-spacing:0.08em;text-transform:uppercase;
  transition:opacity 0.2s;
}
.btn-resume:hover{opacity:0.85;}
.btn-resume svg{fill:currentColor;}

/* Footer */
footer{
  border-top:1px solid var(--border);
  padding:2rem 3rem;
  display:flex;justify-content:space-between;align-items:center;
  max-width:100%;
}
footer p{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.08em;}

/* Animations */
@keyframes slideIn{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes scrollPulse{
  0%,100%{opacity:0.3;}50%{opacity:1;}
}

.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.7s ease,transform 0.7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

@media(max-width:768px){
  /* Hide custom cursor on touch devices */
  .cursor,.cursor-ring{display:none;}
  body{cursor:auto;}

  /* Nav — hide links, keep logo + toggle */
  nav{padding:1rem 1.5rem;}
  .nav-links{display:none;}

  /* Hero */
  .hero{padding:0 1.5rem 3rem;}
  .hero-photo-wrap{display:none;}
  .hero h1{font-size:clamp(3.5rem,18vw,7rem);}
  .hero-bg-text{font-size:clamp(10rem,40vw,20rem);}
  .hero-bottom{flex-direction:column;align-items:flex-start;gap:2rem;}
  .hero-scroll{flex-direction:row;}

  /* Sections */
  .section{padding:3.5rem 1.5rem;}
  .section-title{font-size:clamp(2.5rem,10vw,4rem);}
  .about-grid{grid-template-columns:1fr;gap:2rem;}

  /* Projects */
  .project-item{grid-template-columns:44px 1fr auto;gap:0.75rem;padding:1.5rem 0;}
  .project-name{font-size:1.8rem;}
  .project-num{font-size:2rem;}

  /* Contact */
  .contact-big{font-size:clamp(3rem,12vw,6rem);}
  .contact-link{font-size:11px;}
  .resume-row{flex-direction:column;align-items:flex-start;gap:1rem;}

  footer{padding:1.5rem;flex-direction:column;gap:0.5rem;text-align:center;}
}

@media(max-width:400px){
  .hero h1{font-size:clamp(3rem,18vw,5rem);}
  .contact-big{font-size:clamp(2.5rem,14vw,4rem);}
}
</style>
</head>
<body>

</body>
</html>
